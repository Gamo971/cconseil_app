services:

  # ─────────────────────────────────────────
  # Application PHP / Laravel
  # ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: consulting_os_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
      - ./docker/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - consulting_os_network
    depends_on:
      - db
    environment:
      - PHP_OPCACHE_ENABLE=0

  # ─────────────────────────────────────────
  # Serveur Web Nginx
  # ─────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: consulting_os_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - consulting_os_network
    depends_on:
      - app

  # ─────────────────────────────────────────
  # Base de données MySQL
  # ─────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: consulting_os_db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: consulting_os
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel_password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - consulting_os_network
    command: --default-authentication-plugin=mysql_native_password

  # ─────────────────────────────────────────
  # phpMyAdmin (interface BDD visuelle)
  # ─────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: consulting_os_phpmyadmin
    restart: unless-stopped
    ports:
      - "8082:80"
    environment:
      PMA_HOST: db
      PMA_USER: laravel
      PMA_PASSWORD: laravel_password
    networks:
      - consulting_os_network
    depends_on:
      - db

networks:
  consulting_os_network:
    driver: bridge

volumes:
  db_data:
    driver: local
