; ─── Configuration PHP personnalisée – Consulting OS ──────────────────────────

[PHP]
; Taille max upload (documents clients, CSV...)
upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 300
memory_limit = 512M

; Timezone France
date.timezone = "Europe/Paris"

; Affichage erreurs (désactiver en production)
display_errors = On
error_reporting = E_ALL
